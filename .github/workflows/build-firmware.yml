name: Build ZMK Firmware

on:
  push:
    paths:
      - 'firmware/**'
  workflow_dispatch:

jobs:
  build:
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@main
    with:
      # ZMK's reusable workflow uses underscore input names; the build matrix
      # defaults to ./build.yaml at repo root, but ours lives in firmware/.
      config_path: firmware
      build_matrix_path: firmware/build.yaml
