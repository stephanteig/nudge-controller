# ─────────────────────────────────────────────────────────────────────────────
#  Nudge Controller — ZMK build configuration
#  Board:  nice!nano v2  (Nordic nRF52840, Pro Micro pinout)
#  Shield: nudge_controller
#
#  These CONFIG_* flags are Kconfig options merged into the Zephyr/ZMK build.
#  Anything you can set here you could also set per-board, but keeping it in the
#  shield .conf keeps the whole controller self-contained.
# ─────────────────────────────────────────────────────────────────────────────

# ── Bluetooth ────────────────────────────────────────────────────────────────
# ZMK speaks BLE 5.0 natively on the nRF52840 — enabling it is all that's needed
# for a working wireless keyboard. No extra Bluetooth stack tuning required.
#
# Multi-device profiles: the controller is a BLE peripheral that connects to one
# host at a time and switches between *paired* hosts via the BT_SEL bindings.
# ZMK already defaults to 5 switchable profiles, so we DON'T override
# CONFIG_BT_MAX_CONN / CONFIG_BT_MAX_PAIRED here — forcing MAX_CONN > 1 breaks
# the BT controller's build-time asserts on a peripheral.
CONFIG_ZMK_BLE=y

# Optional range/reliability boost: transmit at +8 dBm. Costs a little current.
# Comment this out if you'd rather squeeze out maximum battery life.
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# ── Rotary encoder (Alps EC11K) ──────────────────────────────────────────────
# The EC11 driver decodes the A/B quadrature pulses into rotation events, which
# the keymap turns into keystrokes via each layer's `sensor-bindings`.
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# ── Power management / battery life ──────────────────────────────────────────
# Deep sleep on inactivity. Asleep the nice!nano draws only tens of microamps,
# so a 2000 mAh LiPo lasts months. It wakes instantly on the next key/encoder
# event because the matrix and encoder pins are flagged `wakeup-source`.
CONFIG_ZMK_SLEEP=y

# Idle time before deep sleep, in milliseconds (900000 = 15 minutes).
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Report battery percentage over BLE (HID battery service) so the host OS and
# the companion configurator app can display the charge level.
CONFIG_ZMK_BATTERY_REPORTING=y
